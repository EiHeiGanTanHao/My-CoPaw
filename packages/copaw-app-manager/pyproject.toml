[project]
name = "copaw-app-manager"
version = "0.1.2"
description = "CoPaw APP Manager - 多工作区管理服务，支持同时运行多个 CoPaw APP 实例"
readme = "README.md"
requires-python = ">=3.10,<3.14"
dependencies = [
    "fastapi>=0.100.0",
    "uvicorn>=0.40.0",
    "click>=8.0.0",
    "psutil>=5.9.0",
    "jinja2>=3.0.0",
    "requests>=2.28.0",
    "pydantic>=2.0.0",
]

[tool.setuptools]
# 注意：源代码在 ../../src/copaw_app_manager 目录
# 独立安装时，使用 pip install copaw-app-manager 从 PyPI 下载
# 开发时，使用 pip install -e ../../src 或者配置 workspace
package-dir = { "" = "../../src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["../../src"]
include = ["copaw_app_manager*"]

[tool.setuptools.package-data]
"copaw_app_manager" = [
    "static/**/*",
    "templates/**/*",
]

[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project.scripts]
copaw-app-manager = "copaw_app_manager.cli.main:app"
