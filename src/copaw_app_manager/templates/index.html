<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 CoPaw APP Manager</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- 头部 -->
    <header class="header">
        <h1>🐾 CoPaw APP Manager</h1>
        <span class="port-info">端口：8000</span>
    </header>

    <!-- 主容器 -->
    <div class="container">
        <!-- 操作栏 -->
        <div style="margin-bottom: 20px;">
            <button class="btn btn-primary" onclick="showCreateModal()">➕ 新建 APP</button>
        </div>

        <!-- 工作区列表 -->
        <div id="workspace-list">
            <!-- 由 JS 动态渲染 -->
        </div>
    </div>

    <!-- 创建 APP 模态框 -->
    <div class="modal-overlay" id="create-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">创建新 APP</h2>
            </div>
            <form id="create-form">
                <div class="form-group">
                    <label class="form-label" for="ws-name">名称 *</label>
                    <input
                        type="text"
                        id="ws-name"
                        class="form-input"
                        placeholder="例如：工作区 A、个人项目"
                        required
                    >
                </div>
                <div class="form-group">
                    <label class="form-label" for="ws-description">描述</label>
                    <input
                        type="text"
                        id="ws-description"
                        class="form-input"
                        placeholder="可选，例如：主要用于日常办公"
                    >
                </div>
                <div class="form-group">
                    <label class="form-label" for="ws-dir">工作目录</label>
                    <input
                        type="text"
                        id="ws-dir"
                        class="form-input"
                        placeholder="留空则自动创建在 apps/ 目录"
                    >
                    <div class="form-hint">
                        例如：D:/copaw-projects/work-a
                    </div>
                </div>
                <div class="form-checkbox">
                    <input type="checkbox" id="ws-auto-start">
                    <label for="ws-auto-start">启动 Manager 时自动运行</label>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="hideCreateModal()">取消</button>
                    <button type="submit" class="btn btn-primary">创建</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
